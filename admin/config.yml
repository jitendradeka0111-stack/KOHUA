backend:
  name: git-gateway
  branch: main

media_folder: "static/uploads"
public_folder: "/static/uploads"

collections:
  - name: "stories"
    label: "Stories from the Ground"
    folder: "content/stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Date", name: "date", widget: "date" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Field Report", "Community Voice", "Conservation", "Music", "Culture", "Tourism"]
      - { label: "Cover Photo", name: "cover", widget: "image" }
      - { label: "Short Summary", name: "summary", widget: "text" }
      - { label: "Full Story", name: "body", widget: "markdown" }

  - name: "library"
    label: "E-Library"
    folder: "content/library"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Folk Tale", "Folklore", "Field Story", "Illustrated Book", "Documentary"]
      - { label: "Region", name: "region", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }

  - name: "gallery"
    label: "Photo Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Caption", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Community", "Nature", "Culture", "Tourism"]
      - { label: "Photo", name: "photo", widget: "image" }
      - { label: "Location", name: "location", widget: "string" }
